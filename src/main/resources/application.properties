spring.application.name=iam-playground
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/iam_db
spring.datasource.username=iam_user
spring.datasource.password=iam_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --------------------------------------------------------------------------------------
# Configuracion JWT
# 
# Clave secreta para firmar los tokens. Debe ser larga (>= 32 bytes para HS256).
# IMPORTANTE: en produccion NUNCA va hardcodeada aca. Va en una variable
# de entorno o en un servicio de secrets management (HashiCorp Vault, AWS Secrets Manager, Azure Key Vault, etc).
iam.jwt.clave-secreta=clave-super-secreta-all-too-well-ten-minutes-version-taylor-version-from-the-vault-2026
# Duracion en milisegundos. 3600000 ms = 1 hora.
iam.jwt.duracion-ms=3600000
# --------------------------------------------------------------------------------------
# Configuración de LDAP (Fase 4)

# URL del servidor OpenLDAP que levantamos en Docker.
# El puerto 389 es el estándar de LDAP sin TLS.
iam.ldap.url=ldap://localhost:389

# Base DN del directorio. Todas las búsquedas arrancan de acá.
iam.ldap.base-dn=dc=tabathapm,dc=local

# Credenciales del admin con el que la app se conecta al directorio para hacer búsquedas. 
# NO es el usuario que se autentica; es la "service account" que usa la app para operar contra LDAP.
iam.ldap.usuario-tecnico=cn=admin,dc=tabathapm,dc=local
iam.ldap.contrasena-tecnico=admin123

# Unidad organizacional donde buscar usuarios.
# Búsquedas como uid=harry-ldap arrancan desde esta OU.
iam.ldap.base-busqueda-usuarios=personas
# ---------------------------------------------------------------------------------------
# Google OAuth2
iam.google.client-id=${GOOGLE_CLIENT_ID}
iam.google.client-secret=${GOOGLE_CLIENT_SECRET}
iam.google.redirect-uri=http://localhost:8080/api/auth/google/callback
iam.google.token-uri=https://oauth2.googleapis.com/token
iam.google.userinfo-uri=https://openidconnect.googleapis.com/v1/userinfo