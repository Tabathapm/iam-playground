# Docker Compose para los servicios de infraestructura del proyecto IAM Playground.

# Cómo usar:
#   docker compose up -d        → levanta los servicios en segundo plano
#   docker compose down         → detiene y elimina los contenedores
#   docker compose logs -f db   → ver logs en vivo del servicio "db"

services:

  # Base de datos relacional para usuarios locales (Fase 2)
  db:
    image: postgres:16-alpine
    container_name: iam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: iam_user
      POSTGRES_PASSWORD: iam_pass
      POSTGRES_DB: iam_db
    ports:
      - "5432:5432"
    volumes:
      - iam_postgres_data:/var/lib/postgresql/data

  # Servicio de directorio OpenLDAP (Fase 4)
  # Permite autenticar usuarios contra un directorio empresarial,
  # tal como Active Directory o eDirectory en un entorno productivo.
  ldap:
    image: osixia/openldap:1.5.0
    container_name: iam-openldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "Tabatha PM"
      LDAP_DOMAIN: "tabathapm.local"
      LDAP_ADMIN_PASSWORD: "admin123"
    ports:
      - "389:389"    # LDAP sin TLS. qué significa esto? que las credenciales viajan sin cifrar, no es seguro para producción.
      - "636:636"    # LDAPS con TLS. qué significa esto? que las credenciales viajan cifradas, es seguro para producción.
    volumes:
      - iam_ldap_data:/var/lib/ldap
      - iam_ldap_config:/etc/ldap/slapd.d

  # Interfaz web para administrar el directorio LDAP (Fase 4)
  # Equivalente a pgAdmin para PostgreSQL: permite visualizar
  # y modificar entradas del directorio desde el navegador.
  ldap-admin:
    image: osixia/phpldapadmin:0.9.0
    container_name: iam-phpldapadmin
    restart: unless-stopped
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    depends_on:
      - ldap

volumes:
  iam_postgres_data:
  iam_ldap_data:
  iam_ldap_config: